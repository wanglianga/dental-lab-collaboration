services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental-lab-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dental-lab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-uploads:
